apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flightly-devsecops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/OWNER/Flightly-Fly-application-K8s-Multi-Cloud.git'
    targetRevision: HEAD
    path: devsecops/gitops/deployments/flightly
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: flightly-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
